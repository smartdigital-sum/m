<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f0f1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    color: #fff;
    user-select: none;
  }
  h1 {
    font-size: 2rem;
    margin-bottom: 0.5rem;
    background: linear-gradient(135deg, #22c55e, #06b6d4);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .meta { display: flex; gap: 2rem; margin-bottom: 1rem; }
  .stat {
    text-align: center;
  }
  .stat span {
    display: block;
    font-size: 0.7rem;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .stat strong {
    font-size: 1.5rem;
    color: #22c55e;
  }
  #gameWrapper {
    position: relative;
  }
  canvas {
    border: 2px solid #22c55e;
    border-radius: 12px;
    box-shadow: 0 0 30px rgba(34,197,94,0.3);
    display: block;
  }
  #overlay {
    position: absolute;
    inset: 0;
    border-radius: 12px;
    background: rgba(0,0,0,0.82);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1rem;
  }
  #overlay h2 { font-size: 1.8rem; color: #22c55e; }
  #overlay p { color: #aaa; font-size: 0.95rem; text-align: center; padding: 0 1.5rem; }
  .btn {
    background: linear-gradient(135deg, #22c55e, #16a34a);
    color: #fff;
    border: none;
    padding: 0.7rem 2rem;
    border-radius: 50px;
    font-size: 1rem;
    cursor: pointer;
    font-weight: 600;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .btn:hover { transform: scale(1.05); box-shadow: 0 4px 20px rgba(34,197,94,0.4); }
  .controls {
    margin-top: 1rem;
    display: grid;
    grid-template-columns: repeat(3, 44px);
    grid-template-rows: repeat(2, 44px);
    gap: 6px;
  }
  .ctrl-btn {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    color: #fff;
    border-radius: 8px;
    font-size: 1.2rem;
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .ctrl-btn:hover, .ctrl-btn:active { background: rgba(34,197,94,0.25); }
  .ctrl-btn.up    { grid-column: 2; grid-row: 1; }
  .ctrl-btn.left  { grid-column: 1; grid-row: 2; }
  .ctrl-btn.down  { grid-column: 2; grid-row: 2; }
  .ctrl-btn.right { grid-column: 3; grid-row: 2; }
  .hint { font-size: 0.75rem; color: #555; margin-top: 0.5rem; }
</style>
</head>
<body>
<h1>🐍 Snake Game</h1>
<div class="meta">
  <div class="stat"><span>Score</span><strong id="score">0</strong></div>
  <div class="stat"><span>Best</span><strong id="best">0</strong></div>
  <div class="stat"><span>Level</span><strong id="level">1</strong></div>
</div>
<div id="gameWrapper">
  <canvas id="canvas" width="400" height="400"></canvas>
  <div id="overlay">
    <h2>🐍 Snake</h2>
    <p>Use arrow keys or the buttons below to move. Eat the food to grow. Don't hit the walls or yourself!</p>
    <button class="btn" onclick="startGame()">Start Game</button>
  </div>
</div>
<div class="controls">
  <button class="ctrl-btn up"    onclick="changeDir(0,-1)">▲</button>
  <button class="ctrl-btn left"  onclick="changeDir(-1,0)">◀</button>
  <button class="ctrl-btn down"  onclick="changeDir(0,1)">▼</button>
  <button class="ctrl-btn right" onclick="changeDir(1,0)">▶</button>
</div>
<p class="hint">Arrow keys / WASD also work</p>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const CELL = 20;
const COLS = canvas.width / CELL;
const ROWS = canvas.height / CELL;

let snake, dir, nextDir, food, score, best = 0, level, speed, loop;

function startGame() {
  snake = [{x:10, y:10},{x:9,y:10},{x:8,y:10}];
  dir = {x:1, y:0};
  nextDir = {x:1, y:0};
  score = 0;
  level = 1;
  speed = 150;
  placeFood();
  updateStats();
  document.getElementById('overlay').style.display = 'none';
  clearInterval(loop);
  loop = setInterval(tick, speed);
}

function placeFood() {
  let pos;
  do {
    pos = {x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS)};
  } while (snake.some(s => s.x===pos.x && s.y===pos.y));
  food = pos;
}

function changeDir(dx, dy) {
  if (dx !== -dir.x || dy !== -dir.y) nextDir = {x:dx, y:dy};
}

function tick() {
  dir = nextDir;
  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS ||
      snake.some(s => s.x === head.x && s.y === head.y)) {
    clearInterval(loop);
    gameOver(); return;
  }
  snake.unshift(head);
  if (head.x === food.x && head.y === food.y) {
    score += 10 * level;
    if (score >= level * 100) { level++; speed = Math.max(60, speed - 15); clearInterval(loop); loop = setInterval(tick, speed); }
    placeFood();
  } else {
    snake.pop();
  }
  updateStats();
  draw();
}

function draw() {
  ctx.fillStyle = '#0f0f1a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Grid dots
  ctx.fillStyle = 'rgba(255,255,255,0.03)';
  for (let x=0; x<COLS; x++) for (let y=0; y<ROWS; y++) {
    ctx.fillRect(x*CELL+CELL/2-1, y*CELL+CELL/2-1, 2, 2);
  }

  // Food
  ctx.fillStyle = '#ef4444';
  ctx.shadowColor = '#ef4444';
  ctx.shadowBlur = 12;
  roundRect(food.x*CELL+2, food.y*CELL+2, CELL-4, CELL-4, 5);
  ctx.shadowBlur = 0;

  // Snake
  snake.forEach((seg, i) => {
    const t = i / snake.length;
    const r = Math.round(34 + (6-34)*t);
    const g = Math.round(197 + (182-197)*t);
    const b = Math.round(94 + (212-94)*t);
    ctx.fillStyle = `rgb(${r},${g},${b})`;
    if (i === 0) {
      ctx.shadowColor = '#22c55e';
      ctx.shadowBlur = 10;
    } else {
      ctx.shadowBlur = 0;
    }
    roundRect(seg.x*CELL+1, seg.y*CELL+1, CELL-2, CELL-2, i===0 ? 6 : 4);
  });
  ctx.shadowBlur = 0;
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
  ctx.fill();
}

function gameOver() {
  if (score > best) { best = score; document.getElementById('best').textContent = best; }
  const ov = document.getElementById('overlay');
  ov.innerHTML = `<h2>💀 Game Over</h2><p>Score: <strong style="color:#22c55e">${score}</strong> &nbsp;|&nbsp; Best: <strong style="color:#06b6d4">${best}</strong></p><button class="btn" onclick="startGame()">Play Again</button>`;
  ov.style.display = 'flex';
}

function updateStats() {
  document.getElementById('score').textContent = score;
  document.getElementById('best').textContent = best;
  document.getElementById('level').textContent = level;
}

document.addEventListener('keydown', e => {
  const map = {ArrowUp:[0,-1],ArrowDown:[0,1],ArrowLeft:[-1,0],ArrowRight:[1,0],
                w:[0,-1], s:[0,1], a:[-1,0], d:[1,0],
                W:[0,-1], S:[0,1], A:[-1,0], D:[1,0]};
  if (map[e.key]) { e.preventDefault(); const [dx,dy] = map[e.key]; changeDir(dx,dy); }
});

// Initial draw
ctx.fillStyle = '#0f0f1a';
ctx.fillRect(0,0,canvas.width,canvas.height);
</script>
</body>
</html>
