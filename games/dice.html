<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dice Roller</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --felt: #0a1a0a;
            --felt-light: #122212;
            --ivory: #f5f0e1;
            --ivory-shadow: #d4cfc0;
            --casino-red: #8b2942;
            --casino-red-light: #a33352;
            --gold: #d4a853;
            --gold-dim: #9a7a3d;
            --blue: #2a5a8b;
            --blue-light: #3a7abd;
            --green: #2a8b5a;
            --green-light: #3abd7a;
            --purple: #6a2a8b;
            --purple-light: #8a3abd;
            --text: #e8e4d9;
            --text-dim: #8a8677;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background:
                radial-gradient(ellipse at 50% 0%, var(--felt-light) 0%, var(--felt) 70%),
                var(--felt);
            font-family: 'DM Sans', sans-serif;
            color: var(--text);
            overflow-x: hidden;
            padding: 2rem 1rem;
        }

        /* Felt texture overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 6vw, 3.5rem);
            font-weight: 700;
            color: var(--gold);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 0.5em;
            text-shadow: 0 2px 20px rgba(212, 168, 83, 0.3);
        }

        .subtitle {
            font-size: 0.85rem;
            color: var(--text-dim);
            letter-spacing: 0.3em;
            text-transform: uppercase;
            margin-bottom: 2rem;
        }

        .controls-panel {
            background: linear-gradient(145deg, #1a2e1a 0%, #0f1f0f 100%);
            border: 2px solid #2a3d2a;
            border-radius: 16px;
            padding: 1.5rem 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 600px;
        }

        .controls-panel h3 {
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            font-size: 1.1rem;
            margin-bottom: 1rem;
            letter-spacing: 0.05em;
        }

        .control-row {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            margin-bottom: 1rem;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .control-group label {
            font-size: 0.8rem;
            color: var(--text-dim);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .control-group select,
        .control-group input[type="range"] {
            background: var(--felt);
            border: 1px solid #2a3d2a;
            color: var(--text);
            padding: 0.5rem;
            border-radius: 6px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            min-width: 150px;
        }

        .control-group select:focus,
        .control-group input[type="range"]:focus {
            outline: none;
            border-color: var(--gold);
        }

        .color-options {
            display: flex;
            gap: 0.5rem;
        }

        .color-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .color-btn:hover {
            transform: scale(1.1);
        }

        .color-btn.active {
            border-color: var(--text);
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.3);
        }

        .color-btn.ivory { background: linear-gradient(145deg, var(--ivory), #e8e3d4); }
        .color-btn.gold { background: linear-gradient(145deg, var(--gold), var(--gold-dim)); }
        .color-btn.red { background: linear-gradient(145deg, var(--casino-red), var(--casino-red-light)); }
        .color-btn.blue { background: linear-gradient(145deg, var(--blue), var(--blue-light)); }
        .color-btn.green { background: linear-gradient(145deg, var(--green), var(--green-light)); }
        .color-btn.purple { background: linear-gradient(145deg, var(--purple), var(--purple-light)); }

        .dice-count-display {
            font-size: 1.2rem;
            color: var(--gold);
            font-weight: 600;
            min-width: 30px;
            text-align: center;
        }

        .table {
            background: linear-gradient(145deg, #1a2e1a 0%, #0f1f0f 100%);
            border: 2px solid #2a3d2a;
            border-radius: 200px 200px 24px 24px;
            padding: 3rem 4rem 2.5rem;
            box-shadow:
                0 40px 80px rgba(0, 0, 0, 0.6),
                inset 0 1px 0 rgba(255, 255, 255, 0.05),
                inset 0 -2px 0 rgba(0, 0, 0, 0.3);
            position: relative;
            max-width: 100%;
            overflow-x: auto;
        }

        .table::before {
            content: '';
            position: absolute;
            inset: 8px;
            border: 1px solid rgba(212, 168, 83, 0.1);
            border-radius: 192px 192px 16px 16px;
            pointer-events: none;
        }

        .dice-container {
            display: flex;
            gap: 2.5rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .dice-wrapper {
            position: relative;
        }

        .dice {
            width: 110px;
            height: 110px;
            background: linear-gradient(145deg, var(--ivory) 0%, #e8e3d4 100%);
            border-radius: 14px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            padding: 14px;
            box-shadow:
                0 8px 24px rgba(0, 0, 0, 0.4),
                0 2px 4px rgba(0, 0, 0, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.8),
                inset 0 -1px 0 var(--ivory-shadow);
            transition: transform 0.1s ease;
        }

        .dice.rolling {
            animation: roll 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        @keyframes roll {
            0% { transform: rotate(0deg) scale(1); }
            20% { transform: rotate(90deg) scale(0.85); }
            40% { transform: rotate(180deg) scale(1.1); }
            60% { transform: rotate(270deg) scale(0.9); }
            80% { transform: rotate(330deg) scale(1.05); }
            100% { transform: rotate(360deg) scale(1); }
        }

        .dice.lit {
            animation: land 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes land {
            0% { transform: scale(1.15) translateY(-8px); }
            100% { transform: scale(1) translateY(0); }
        }

        .dot {
            width: 20px;
            height: 20px;
            background: radial-gradient(circle at 35% 35%, var(--casino-red-light), var(--casino-red));
            border-radius: 50%;
            align-self: center;
            justify-self: center;
            display: none;
            box-shadow:
                inset 0 -2px 4px rgba(0, 0, 0, 0.3),
                0 1px 2px rgba(0, 0, 0, 0.2);
            animation: pipReveal 0.2s ease-out;
        }

        @keyframes pipReveal {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        /* FATE dice styles */
        .dice.fate {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 700;
            font-family: 'Playfair Display', serif;
        }

        .dice.fate .dot {
            display: none !important;
        }

        .fate-symbol {
            display: none;
            animation: pipReveal 0.2s ease-out;
        }

        .dice.fate .fate-symbol {
            display: block;
        }

        /* D20 dice styles */
        .dice.d20 {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            font-weight: 700;
            font-family: 'Playfair Display', serif;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            border-radius: 0;
        }

        .dice.d20 .dot {
            display: none !important;
        }

        .d20-value {
            display: none;
            animation: pipReveal 0.2s ease-out;
        }

        .dice.d20 .d20-value {
            display: block;
        }

        /* Color variants for dice */
        .dice.color-gold {
            background: linear-gradient(145deg, var(--gold) 0%, var(--gold-dim) 100%);
            box-shadow:
                0 8px 24px rgba(212, 168, 83, 0.4),
                0 2px 4px rgba(0, 0, 0, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.5),
                inset 0 -1px 0 var(--gold-dim);
        }

        .dice.color-gold .dot {
            background: radial-gradient(circle at 35% 35%, #1a1a1a, #0a0a0a);
        }

        .dice.color-red {
            background: linear-gradient(145deg, var(--casino-red-light) 0%, var(--casino-red) 100%);
            box-shadow:
                0 8px 24px rgba(139, 41, 66, 0.4),
                0 2px 4px rgba(0, 0, 0, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.3),
                inset 0 -1px 0 var(--casino-red);
        }

        .dice.color-red .dot {
            background: radial-gradient(circle at 35% 35%, var(--ivory), #e8e3d4);
        }

        .dice.color-blue {
            background: linear-gradient(145deg, var(--blue-light) 0%, var(--blue) 100%);
            box-shadow:
                0 8px 24px rgba(42, 90, 139, 0.4),
                0 2px 4px rgba(0, 0, 0, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.3),
                inset 0 -1px 0 var(--blue);
        }

        .dice.color-blue .dot {
            background: radial-gradient(circle at 35% 35%, var(--ivory), #e8e3d4);
        }

        .dice.color-green {
            background: linear-gradient(145deg, var(--green-light) 0%, var(--green) 100%);
            box-shadow:
                0 8px 24px rgba(42, 139, 90, 0.4),
                0 2px 4px rgba(0, 0, 0, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.3),
                inset 0 -1px 0 var(--green);
        }

        .dice.color-green .dot {
            background: radial-gradient(circle at 35% 35%, var(--ivory), #e8e3d4);
        }

        .dice.color-purple {
            background: linear-gradient(145deg, var(--purple-light) 0%, var(--purple) 100%);
            box-shadow:
                0 8px 24px rgba(106, 42, 139, 0.4),
                0 2px 4px rgba(0, 0, 0, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.3),
                inset 0 -1px 0 var(--purple);
        }

        .dice.color-purple .dot {
            background: radial-gradient(circle at 35% 35%, var(--ivory), #e8e3d4);
        }

        .controls {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 1rem 2.5rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-roll {
            background: linear-gradient(145deg, var(--gold), var(--gold-dim));
            color: #1a1a1a;
            box-shadow:
                0 4px 16px rgba(212, 168, 83, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
        }

        .btn-roll:hover {
            background: linear-gradient(145deg, #e4b863, var(--gold));
            transform: translateY(-2px);
            box-shadow:
                0 8px 24px rgba(212, 168, 83, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
        }

        .btn-roll:active {
            transform: translateY(0) scale(0.98);
        }

        .btn-reset {
            background: transparent;
            color: var(--text-dim);
            border: 1px solid var(--text-dim);
        }

        .btn-reset:hover {
            color: var(--text);
            border-color: var(--text);
            background: rgba(255, 255, 255, 0.05);
        }

        .btn-sound {
            background: transparent;
            color: var(--text-dim);
            border: 1px solid var(--text-dim);
            padding: 1rem 1.5rem;
        }

        .btn-sound:hover {
            color: var(--text);
            border-color: var(--text);
            background: rgba(255, 255, 255, 0.05);
        }

        .btn-sound.muted {
            opacity: 0.5;
        }

        .result-area {
            margin-top: 2.5rem;
            text-align: center;
            min-height: 5rem;
        }

        #result {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            color: var(--gold);
            margin-bottom: 0.5rem;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s ease;
        }

        #result.show {
            opacity: 1;
            transform: translateY(0);
        }

        #history {
            font-size: 0.9rem;
            color: var(--text-dim);
            letter-spacing: 0.05em;
        }

        /* Decorative corner elements */
        .corner {
            position: fixed;
            width: 120px;
            height: 120px;
            opacity: 0.15;
        }
        .corner-tl { top: 20px; left: 20px; border-top: 2px solid var(--gold); border-left: 2px solid var(--gold); }
        .corner-tr { top: 20px; right: 20px; border-top: 2px solid var(--gold); border-right: 2px solid var(--gold); }
        .corner-bl { bottom: 20px; left: 20px; border-bottom: 2px solid var(--gold); border-left: 2px solid var(--gold); }
        .corner-br { bottom: 20px; right: 20px; border-bottom: 2px solid var(--gold); border-right: 2px solid var(--gold); }

        /* Statistics Panel */
        .stats-panel {
            background: linear-gradient(145deg, #1a2e1a 0%, #0f1f0f 100%);
            border: 2px solid #2a3d2a;
            border-radius: 16px;
            margin-top: 2rem;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            overflow: hidden;
        }

        .stats-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.5rem;
            cursor: pointer;
            border-bottom: 1px solid #2a3d2a;
            transition: background 0.2s ease;
        }

        .stats-header:hover {
            background: rgba(212, 168, 83, 0.1);
        }

        .stats-header h3 {
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            font-size: 1.1rem;
            margin: 0;
            letter-spacing: 0.05em;
        }

        #statsToggleIcon {
            color: var(--text-dim);
            font-size: 0.9rem;
            transition: transform 0.3s ease;
        }

        #statsToggleIcon.collapsed {
            transform: rotate(-90deg);
        }

        .stats-content {
            padding: 1.5rem;
            max-height: 500px;
            overflow-y: auto;
            transition: max-height 0.3s ease, padding 0.3s ease;
        }

        .stats-content.collapsed {
            max-height: 0;
            padding: 0 1.5rem;
            overflow: hidden;
        }

        .stats-section {
            margin-bottom: 1.5rem;
        }

        .stats-section:last-child {
            margin-bottom: 0;
        }

        .stats-section h4 {
            color: var(--gold);
            font-size: 0.85rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 0.75rem;
            font-family: 'DM Sans', sans-serif;
            font-weight: 600;
        }

        /* Distribution Chart */
        .distribution-chart {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .dist-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .dist-label {
            width: 24px;
            text-align: right;
            color: var(--text);
            font-size: 0.85rem;
            font-weight: 500;
        }

        .dist-bar-container {
            flex: 1;
            height: 18px;
            background: var(--felt);
            border-radius: 4px;
            overflow: hidden;
        }

        .dist-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--gold), var(--gold-dim));
            border-radius: 4px;
            transition: width 0.3s ease;
            min-width: 0;
        }

        .dist-count {
            width: 36px;
            text-align: left;
            color: var(--text-dim);
            font-size: 0.8rem;
        }

        /* Records */
        .records {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
        }

        .record-item {
            background: var(--felt);
            border-radius: 8px;
            padding: 0.75rem;
            text-align: center;
        }

        .record-label {
            font-size: 0.7rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.25rem;
        }

        .record-value {
            font-size: 1.2rem;
            color: var(--gold);
            font-family: 'Playfair Display', serif;
            font-weight: 700;
        }

        /* Streaks */
        .streaks {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .streak-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--felt);
            border-radius: 8px;
            padding: 0.5rem 0.75rem;
        }

        .streak-description {
            font-size: 0.85rem;
            color: var(--text);
        }

        .streak-count {
            font-size: 0.9rem;
            color: var(--gold);
            font-weight: 600;
        }

        /* Summary */
        .summary {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.75rem;
        }

        .summary-item {
            background: var(--felt);
            border-radius: 8px;
            padding: 0.75rem;
            text-align: center;
        }

        .summary-label {
            font-size: 0.7rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.25rem;
        }

        .summary-value {
            font-size: 1rem;
            color: var(--text);
            font-weight: 500;
        }

        .no-data {
            color: var(--text-dim);
            font-style: italic;
            font-size: 0.85rem;
            text-align: center;
            padding: 0.5rem;
        }

        @media (max-width: 768px) {
            .stats-panel {
                margin-top: 1.5rem;
            }

            .records {
                grid-template-columns: 1fr;
            }

            .summary {
                grid-template-columns: 1fr 1fr;
            }
        }

        @media (max-width: 768px) {
            .table {
                padding: 2rem 1.5rem;
                border-radius: 100px 100px 16px 16px;
            }
            
            .table::before {
                border-radius: 92px 92px 8px 8px;
            }

            .dice {
                width: 80px;
                height: 80px;
                padding: 10px;
            }

            .dot {
                width: 14px;
                height: 14px;
            }

            .dice.fate {
                font-size: 1.8rem;
            }

            .dice.d20 {
                font-size: 1.6rem;
            }

            .control-row {
                flex-direction: column;
                gap: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <h1>Dice Roller</h1>
    <p class="subtitle">Fortune Favors the Bold</p>

    <div class="controls-panel">
        <h3>Customize Your Dice</h3>
        <div class="control-row">
            <div class="control-group">
                <label for="diceCount">Number of Dice</label>
                <div style="display: flex; align-items: center; gap: 0.5rem;">
                    <input type="range" id="diceCount" min="1" max="6" value="2" style="width: 120px;" aria-label="Number of dice to roll">
                    <span class="dice-count-display" id="diceCountDisplay" aria-live="polite">2</span>
                </div>
            </div>
            <div class="control-group">
                <label for="diceType">Dice Type</label>
                <select id="diceType" aria-label="Select dice type">
                    <option value="standard">Standard (1-6)</option>
                    <option value="fate">FATE (+, ·, -)</option>
                    <option value="d20">D20 (1-20)</option>
                </select>
            </div>
            <div class="control-group">
                <label>Dice Color</label>
                <div class="color-options" role="radiogroup" aria-label="Dice color selection">
                    <button class="color-btn ivory active" data-color="ivory" title="Ivory"></button>
                    <button class="color-btn gold" data-color="gold" title="Gold"></button>
                    <button class="color-btn red" data-color="red" title="Casino Red"></button>
                    <button class="color-btn blue" data-color="blue" title="Blue"></button>
                    <button class="color-btn green" data-color="green" title="Green"></button>
                    <button class="color-btn purple" data-color="purple" title="Purple"></button>
                </div>
            </div>
        </div>
    </div>

    <div class="table">
        <div class="dice-container" id="diceContainer">
            <!-- Dice will be dynamically generated here -->
        </div>

        <div class="controls">
            <button class="btn-roll" onclick="rollDice()">Roll</button>
            <button class="btn-reset" onclick="resetTotal()">Reset</button>
            <button class="btn-sound" id="soundToggle" onclick="toggleSound()">🔊</button>
        </div>
    </div>

    <div class="result-area">
        <div id="result"></div>
        <div id="history">Running total: 0</div>
    </div>

    <div class="stats-panel" id="statsPanel">
        <div class="stats-header" onclick="toggleStatsPanel()">
            <h3>📊 Statistics</h3>
            <span id="statsToggleIcon">▼</span>
        </div>
        <div class="stats-content" id="statsContent">
            <div class="stats-section">
                <h4>Roll Distribution</h4>
                <div class="distribution-chart" id="distributionChart"></div>
            </div>
            <div class="stats-section">
                <h4>Records</h4>
                <div class="records" id="records"></div>
            </div>
            <div class="stats-section">
                <h4>Streaks</h4>
                <div class="streaks" id="streaks"></div>
            </div>
            <div class="stats-section">
                <h4>Summary</h4>
                <div class="summary" id="summary"></div>
            </div>
        </div>
    </div>

    <script>
        // Sound effects using Web Audio API
        class SoundManager {
            constructor() {
                this.audioContext = null;
                this.muted = false;
                this.initialized = false;
            }

            init() {
                if (this.initialized) return;
                try {
                    this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    this.initialized = true;
                } catch (e) {
                    console.warn('Web Audio API not supported:', e);
                }
            }

            playRollSound() {
                if (this.muted || !this.audioContext) return;
                
                const now = this.audioContext.currentTime;
                
                // Create multiple short bursts for rolling effect
                for (let i = 0; i < 8; i++) {
                    const oscillator = this.audioContext.createOscillator();
                    const gainNode = this.audioContext.createGain();
                    
                    oscillator.connect(gainNode);
                    gainNode.connect(this.audioContext.destination);
                    
                    // Random frequency for each click
                    oscillator.frequency.value = 800 + Math.random() * 400;
                    oscillator.type = 'sine';
                    
                    // Quick envelope
                    gainNode.gain.setValueAtTime(0, now + i * 0.05);
                    gainNode.gain.linearRampToValueAtTime(0.15, now + i * 0.05 + 0.01);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + i * 0.05 + 0.08);
                    
                    oscillator.start(now + i * 0.05);
                    oscillator.stop(now + i * 0.05 + 0.08);
                }
            }

            playLandSound() {
                if (this.muted || !this.audioContext) return;
                
                const now = this.audioContext.currentTime;
                
                // Create a satisfying "thud" sound
                const oscillator = this.audioContext.createOscillator();
                const gainNode = this.audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(this.audioContext.destination);
                
                oscillator.frequency.setValueAtTime(150, now);
                oscillator.frequency.exponentialRampToValueAtTime(80, now + 0.1);
                oscillator.type = 'sine';
                
                gainNode.gain.setValueAtTime(0.3, now);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
                
                oscillator.start(now);
                oscillator.stop(now + 0.15);

                // Add a subtle high-frequency click
                const clickOsc = this.audioContext.createOscillator();
                const clickGain = this.audioContext.createGain();
                
                clickOsc.connect(clickGain);
                clickGain.connect(this.audioContext.destination);
                
                clickOsc.frequency.value = 1200;
                clickOsc.type = 'sine';
                
                clickGain.gain.setValueAtTime(0.1, now);
                clickGain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
                
                clickOsc.start(now);
                clickOsc.stop(now + 0.05);
            }

            toggle() {
                this.muted = !this.muted;
                return this.muted;
            }
        }

        const soundManager = new SoundManager();

        // Dice patterns for standard dice
        const patterns = {
            1: [5],
            2: [3, 7],
            3: [3, 5, 7],
            4: [1, 3, 7, 9],
            5: [1, 3, 5, 7, 9],
            6: [1, 3, 4, 6, 7, 9]
        };

        // Configuration constants
        const CONFIG = {
            MAX_DICE: 6,
            MIN_DICE: 1,
            DEFAULT_DICE: 2,
            FATE_SYMBOLS: ['+', '·', '-'],  // Using middle dot for blank (visible but neutral)
            FATE_VALUES: { 0: 1, 1: 0, 2: -1 },  // + = +1, · = 0, - = -1
            D20_MIN: 1,
            D20_MAX: 20,
            STANDARD_MIN: 1,
            STANDARD_MAX: 6
        };

        // FATE dice symbols (for display)
        const fateSymbols = CONFIG.FATE_SYMBOLS;

        // State
        let total = 0;
        let isRolling = false;
        let currentDiceCount = CONFIG.DEFAULT_DICE;
        let currentDiceType = 'standard';
        let currentColor = 'ivory';

        // Statistics state
        let stats = {
            totalRolls: 0,
            frequency: {},       // { value: count }
            highestRoll: null,
            lowestRoll: null,
            rollHistory: [],     // Last N roll totals
            streaks: {
                currentStreak: null,  // { value, count }
                longestStreak: null   // { value, count }
            },
            sessionStart: Date.now()
        };

        let statsPanelCollapsed = false;

        // Initialize
        function init() {
            updateDiceCount(currentDiceCount);
            setupEventListeners();
        }

        function setupEventListeners() {
            // Dice count slider
            const diceCountSlider = document.getElementById('diceCount');
            const diceCountDisplay = document.getElementById('diceCountDisplay');
            
            diceCountSlider.addEventListener('input', (e) => {
                currentDiceCount = parseInt(e.target.value);
                diceCountDisplay.textContent = currentDiceCount;
                updateDiceCount(currentDiceCount);
            });

            // Dice type selector
            document.getElementById('diceType').addEventListener('change', (e) => {
                currentDiceType = e.target.value;
                updateDiceCount(currentDiceCount);
            });

            // Color buttons
            document.querySelectorAll('.color-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentColor = btn.dataset.color;
                    updateDiceColor();
                });
            });
        }

        function updateDiceCount(count) {
            const container = document.getElementById('diceContainer');
            container.innerHTML = '';

            for (let i = 0; i < count; i++) {
                const wrapper = document.createElement('div');
                wrapper.className = 'dice-wrapper';

                const dice = document.createElement('div');
                dice.className = `dice ${currentDiceType !== 'standard' ? currentDiceType : ''} ${currentColor !== 'ivory' ? 'color-' + currentColor : ''}`;
                dice.id = `dice${i}`;
                dice.setAttribute('role', 'img');
                dice.setAttribute('aria-label', `${currentDiceType} dice showing 1`);

                if (currentDiceType === 'standard') {
                    // Create 9 dots for standard dice
                    for (let j = 0; j < 9; j++) {
                        const dot = document.createElement('div');
                        dot.className = 'dot';
                        dice.appendChild(dot);
                    }
                } else if (currentDiceType === 'fate') {
                    // Create FATE symbol
                    const symbol = document.createElement('div');
                    symbol.className = 'fate-symbol';
                    symbol.textContent = ' ';
                    dice.appendChild(symbol);
                } else if (currentDiceType === 'd20') {
                    // Create D20 value display
                    const value = document.createElement('div');
                    value.className = 'd20-value';
                    value.textContent = '1';
                    dice.appendChild(value);
                }

                wrapper.appendChild(dice);
                container.appendChild(wrapper);

                // Initialize with value 1
                if (currentDiceType === 'standard') {
                    renderDice(dice, 1);
                }
            }
        }

        function updateDiceColor() {
            document.querySelectorAll('.dice').forEach(dice => {
                // Remove all color classes (ivory is default, so we remove all variants)
                dice.classList.remove('color-gold', 'color-red', 'color-blue', 'color-green', 'color-purple');
                
                // Add new color class if not ivory (ivory is the default style)
                if (currentColor !== 'ivory') {
                    dice.classList.add('color-' + currentColor);
                }
            });
        }

        function renderDice(diceEl, value, animate = false) {
            if (currentDiceType === 'standard') {
                if (!patterns[value]) return;
                const dots = diceEl.querySelectorAll('.dot');
                dots.forEach((d, i) => {
                    const shouldShow = patterns[value].includes(i + 1);
                    d.style.display = shouldShow ? 'block' : 'none';
                    if (shouldShow && animate) {
                        d.style.animation = 'none';
                        d.offsetHeight; // Trigger reflow
                        d.style.animation = 'pipReveal 0.2s ease-out';
                    }
                });
                diceEl.setAttribute('aria-label', `Standard dice showing ${value}`);
            } else if (currentDiceType === 'fate') {
                const symbol = diceEl.querySelector('.fate-symbol');
                if (symbol) {
                    symbol.textContent = fateSymbols[value] || '·';
                    if (animate) {
                        symbol.style.animation = 'none';
                        symbol.offsetHeight;
                        symbol.style.animation = 'pipReveal 0.2s ease-out';
                    }
                }
                const fateValue = CONFIG.FATE_VALUES[value] ?? 0;
                const fateLabel = fateValue > 0 ? '+' : fateValue < 0 ? '-' : 'blank';
                diceEl.setAttribute('aria-label', `FATE dice showing ${fateLabel} (${fateValue > 0 ? '+' : ''}${fateValue})`);
            } else if (currentDiceType === 'd20') {
                const valueEl = diceEl.querySelector('.d20-value');
                if (valueEl) {
                    valueEl.textContent = value;
                    if (animate) {
                        valueEl.style.animation = 'none';
                        valueEl.offsetHeight;
                        valueEl.style.animation = 'pipReveal 0.2s ease-out';
                    }
                }
                diceEl.setAttribute('aria-label', `D20 dice showing ${value}`);
            }
        }

        function resetTotal() {
            total = 0;
            document.getElementById('history').textContent = 'Running total: 0';
            document.getElementById('result').classList.remove('show');
            resetStats();
        }

        function resetStats() {
            stats = {
                totalRolls: 0,
                frequency: {},
                highestRoll: null,
                lowestRoll: null,
                rollHistory: [],
                streaks: {
                    currentStreak: null,
                    longestStreak: null
                },
                sessionStart: Date.now()
            };
            updateStatsDisplay();
        }

        function updateStats(rollTotal, individualResults) {
            stats.totalRolls++;

            // Update frequency distribution
            const resultKey = currentDiceType === 'fate' 
                ? individualResults.map(v => fateSymbols[v]).join('')
                : rollTotal;
            
            if (currentDiceType !== 'fate') {
                stats.frequency[rollTotal] = (stats.frequency[rollTotal] || 0) + 1;
            } else {
                stats.frequency[resultKey] = (stats.frequency[resultKey] || 0) + 1;
            }

            // Update highest/lowest
            if (stats.highestRoll === null || rollTotal > stats.highestRoll) {
                stats.highestRoll = rollTotal;
            }
            if (stats.lowestRoll === null || rollTotal < stats.lowestRoll) {
                stats.lowestRoll = rollTotal;
            }

            // Update streaks
            updateStreaks(rollTotal);

            // Add to history (keep last 20)
            stats.rollHistory.push(rollTotal);
            if (stats.rollHistory.length > 20) {
                stats.rollHistory.shift();
            }

            updateStatsDisplay();
        }

        function updateStreaks(rollTotal) {
            const current = stats.streaks.currentStreak;
            
            if (current && current.value === rollTotal) {
                current.count++;
            } else {
                stats.streaks.currentStreak = { value: rollTotal, count: 1 };
            }

            if (!stats.streaks.longestStreak || 
                stats.streaks.currentStreak.count > stats.streaks.longestStreak.count) {
                stats.streaks.longestStreak = { ...stats.streaks.currentStreak };
            }
        }

        function updateStatsDisplay() {
            updateDistributionChart();
            updateRecords();
            updateStreaksDisplay();
            updateSummary();
        }

        function updateDistributionChart() {
            const container = document.getElementById('distributionChart');
            const freq = stats.frequency;
            const keys = Object.keys(freq);
            
            if (keys.length === 0) {
                container.innerHTML = '<div class="no-data">No rolls yet</div>';
                return;
            }

            const maxCount = Math.max(...Object.values(freq));
            
            // Sort keys numerically for standard/d20, keep order for FATE
            let sortedKeys;
            if (currentDiceType === 'fate') {
                sortedKeys = keys;
            } else {
                sortedKeys = keys.map(Number).sort((a, b) => a - b);
            }

            let html = '';
            sortedKeys.forEach(key => {
                const count = freq[key];
                const percentage = (count / maxCount) * 100;
                html += `
                    <div class="dist-row">
                        <span class="dist-label">${key}</span>
                        <div class="dist-bar-container">
                            <div class="dist-bar" style="width: ${percentage}%"></div>
                        </div>
                        <span class="dist-count">${count}</span>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        function updateRecords() {
            const container = document.getElementById('records');
            
            if (stats.highestRoll === null) {
                container.innerHTML = '<div class="no-data">No rolls yet</div>';
                return;
            }

            const avg = stats.rollHistory.length > 0 
                ? (stats.rollHistory.reduce((a, b) => a + b, 0) / stats.rollHistory.length).toFixed(1)
                : '-';

            container.innerHTML = `
                <div class="record-item">
                    <div class="record-label">Highest Roll</div>
                    <div class="record-value">${stats.highestRoll}</div>
                </div>
                <div class="record-item">
                    <div class="record-label">Lowest Roll</div>
                    <div class="record-value">${stats.lowestRoll}</div>
                </div>
                <div class="record-item">
                    <div class="record-label">Avg (last 20)</div>
                    <div class="record-value">${avg}</div>
                </div>
                <div class="record-item">
                    <div class="record-label">Total Rolls</div>
                    <div class="record-value">${stats.totalRolls}</div>
                </div>
            `;
        }

        function updateStreaksDisplay() {
            const container = document.getElementById('streaks');
            const current = stats.streaks.currentStreak;
            const longest = stats.streaks.longestStreak;

            if (!current || current.count < 2) {
                container.innerHTML = '<div class="no-data">No streaks yet (need 2+ same rolls)</div>';
                return;
            }

            let html = '';
            
            if (current.count >= 2) {
                html += `
                    <div class="streak-item">
                        <span class="streak-description">Current: Rolled ${current.value}</span>
                        <span class="streak-count">${current.count}x in a row</span>
                    </div>
                `;
            }

            if (longest && longest.count >= 2) {
                html += `
                    <div class="streak-item">
                        <span class="streak-description">Best: Rolled ${longest.value}</span>
                        <span class="streak-count">${longest.count}x in a row</span>
                    </div>
                `;
            }

            container.innerHTML = html;
        }

        function updateSummary() {
            const container = document.getElementById('summary');
            
            if (stats.totalRolls === 0) {
                container.innerHTML = '<div class="no-data">No rolls yet</div>';
                return;
            }

            const elapsed = Math.floor((Date.now() - stats.sessionStart) / 1000);
            const minutes = Math.floor(elapsed / 60);
            const seconds = elapsed % 60;
            const timeStr = minutes > 0 ? `${minutes}m ${seconds}s` : `${seconds}s`;

            const allTime = stats.rollHistory.reduce((a, b) => a + b, 0);
            
            // Find most common roll
            let mostCommon = '-';
            let maxFreq = 0;
            for (const [key, count] of Object.entries(stats.frequency)) {
                if (count > maxFreq) {
                    maxFreq = count;
                    mostCommon = key;
                }
            }

            container.innerHTML = `
                <div class="summary-item">
                    <div class="summary-label">Session Time</div>
                    <div class="summary-value">${timeStr}</div>
                </div>
                <div class="summary-item">
                    <div class="summary-label">All-Time Total</div>
                    <div class="summary-value">${allTime}</div>
                </div>
                <div class="summary-item">
                    <div class="summary-label">Most Common</div>
                    <div class="summary-value">${mostCommon}</div>
                </div>
            `;
        }

        function toggleStatsPanel() {
            statsPanelCollapsed = !statsPanelCollapsed;
            const content = document.getElementById('statsContent');
            const icon = document.getElementById('statsToggleIcon');
            
            if (statsPanelCollapsed) {
                content.classList.add('collapsed');
                icon.classList.add('collapsed');
            } else {
                content.classList.remove('collapsed');
                icon.classList.remove('collapsed');
            }
        }

        function rollDice() {
            if (isRolling) return;
            
            // Initialize sound on first user interaction
            soundManager.init();
            
            isRolling = true;

            const diceElements = document.querySelectorAll('.dice');
            const resultEl = document.getElementById('result');
            const historyEl = document.getElementById('history');

            resultEl.classList.remove('show');

            // Play rolling sound
            soundManager.playRollSound();

            // Add rolling animation to all dice
            diceElements.forEach(dice => {
                dice.classList.add('rolling');
                
                // Hide content during roll
                if (currentDiceType === 'standard') {
                    dice.querySelectorAll('.dot').forEach(d => d.style.display = 'none');
                } else if (currentDiceType === 'fate') {
                    const symbol = dice.querySelector('.fate-symbol');
                    if (symbol) symbol.style.display = 'none';
                } else if (currentDiceType === 'd20') {
                    const value = dice.querySelector('.d20-value');
                    if (value) value.style.display = 'none';
                }
            });

            setTimeout(() => {
                let rollTotal = 0;
                const results = [];

                diceElements.forEach((dice, index) => {
                    dice.classList.remove('rolling');

                    let value;
                    if (currentDiceType === 'standard') {
                        value = Math.floor(Math.random() * 6) + 1;
                    } else if (currentDiceType === 'fate') {
                        value = Math.floor(Math.random() * 3); // 0, 1, or 2
                    } else if (currentDiceType === 'd20') {
                        value = Math.floor(Math.random() * 20) + 1;
                    }

                    results.push(value);
                    renderDice(dice, value, true);

                    // Calculate total based on dice type
                    if (currentDiceType === 'standard') {
                        rollTotal += value;
                    } else if (currentDiceType === 'fate') {
                        // FATE: + = +1, blank = 0, - = -1
                        rollTotal += (value === 0 ? 1 : value === 1 ? 0 : -1);
                    } else if (currentDiceType === 'd20') {
                        rollTotal += value;
                    }

                    // Add landing effect with slight delay per die
                    setTimeout(() => {
                        dice.classList.add('lit');
                        setTimeout(() => {
                            dice.classList.remove('lit');
                        }, 400);
                    }, 50 + index * 50);
                });

                // Play landing sound
                setTimeout(() => {
                    soundManager.playLandSound();
                }, 100);

                total += rollTotal;

                // Format result display
                let resultText;
                if (currentDiceType === 'standard') {
                    resultText = results.join(' + ');
                } else if (currentDiceType === 'fate') {
                    resultText = results.map(v => fateSymbols[v]).join(' ');
                } else if (currentDiceType === 'd20') {
                    resultText = results.join(' + ');
                }

                resultEl.textContent = resultText;
                historyEl.textContent = `Running total: ${total}`;

                // Update statistics
                updateStats(rollTotal, results);

                resultEl.classList.add('show');
                isRolling = false;
            }, 500);
        }

        function toggleSound() {
            const muted = soundManager.toggle();
            const btn = document.getElementById('soundToggle');
            btn.textContent = muted ? '🔇' : '🔊';
            btn.classList.toggle('muted', muted);
        }

        // Initialize on load
        init();
    </script>
</body>
</html>
