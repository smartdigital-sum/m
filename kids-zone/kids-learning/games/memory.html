<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memory Match — Kids Fun Learning</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="../favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="../assets/css/theme.css" />
  </head>
  <body class="kid-site theme-memory">
    <a href="#main-content" class="kid-skip-link">Skip to main content</a>

    <div class="kid-bubbles" aria-hidden="true">
      <span></span><span></span><span></span><span></span><span></span>
    </div>
    <div class="kid-wrap">
      <div class="kid-topbar">
        <button type="button" class="kid-sound-toggle" id="kid-sound-btn" aria-pressed="false">
          <span class="kid-sound-icon" aria-hidden="true">🔊</span>
          <span class="kid-sound-label">Sound on</span>
        </button>
      </div>

      <a href="../index.html" class="kid-back">⬅ Back to home</a>

      <header class="kid-header">
        <h1 id="main-content" tabindex="-1">🃏 Memory Match 🃏</h1>
        <p>Flip cards, find pairs, train your brain!</p>
      </header>

      <div class="kid-diff-row">
        <button type="button" class="kid-diff is-on" data-diff="easy">🌱 Easy (6 pairs)</button>
        <button type="button" class="kid-diff" data-diff="medium">🔥 Medium (8 pairs)</button>
        <button type="button" class="kid-diff" data-diff="hard">💪 Hard (12 pairs)</button>
      </div>

      <section class="kid-panel" id="game-panel">
        <div class="memory-stats">
          <div class="memory-stat">
            <div class="memory-stat-val" id="moves">0</div>
            <div class="memory-stat-label">Moves</div>
          </div>
          <div class="memory-stat">
            <div class="memory-stat-val" id="pairs-found">0</div>
            <div class="memory-stat-label">Pairs</div>
          </div>
          <div class="memory-stat">
            <div class="memory-stat-val" id="timer">0:00</div>
            <div class="memory-stat-label">Time</div>
          </div>
        </div>

        <div class="memory-grid" id="memory-grid" role="grid" aria-label="Memory cards"></div>

        <div class="kid-actions">
          <button type="button" class="kid-btn-primary" id="restart-btn">🔄 Restart</button>
        </div>

        <div class="kid-msg" id="message" aria-live="polite"></div>
      </section>

      <section class="kid-panel kid-result" id="result-area" aria-live="polite">
        <div class="big" id="result-icon" aria-hidden="true">🎉</div>
        <h2 id="result-title">Amazing!</h2>
        <p id="result-message">You found all pairs!</p>
        <div class="kid-scores" id="result-stats"></div>
        <button type="button" class="kid-btn-restart" id="play-again-btn">Play again 🔄</button>
      </section>
    </div>

    <script src="../assets/js/sounds.js"></script>
    <script src="../assets/js/utils.js"></script>
    <script src="../assets/js/effects.js"></script>
    <script src="../assets/js/common.js"></script>
    <script src="../assets/js/memory.js"></script>
  </body>
</html>
