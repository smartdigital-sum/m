<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Typing Game вАФ Kids Fun Learning</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="../favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="../assets/css/theme.css" />
  </head>
  <body class="kid-site theme-typing">
    <a href="#main-content" class="kid-skip-link">Skip to main content</a>

    <div class="kid-bubbles" aria-hidden="true">
      <span></span><span></span><span></span><span></span><span></span>
    </div>
    <div class="kid-wrap">
      <div class="kid-topbar">
        <button type="button" class="kid-sound-toggle" id="kid-sound-btn" aria-pressed="false">
          <span class="kid-sound-icon" aria-hidden="true">рЯФК</span>
          <span class="kid-sound-label">Sound on</span>
        </button>
      </div>

      <a href="../index.html" class="kid-back">вђЕ Back to home</a>

      <header class="kid-header">
        <h1 id="main-content" tabindex="-1">вМ®пЄП Typing Game вМ®пЄП</h1>
        <p>Type the falling letters before they reach the bottom!</p>
      </header>

      <div class="kid-diff-row">
        <button type="button" class="kid-diff is-on" data-diff="easy">рЯМ± Easy</button>
        <button type="button" class="kid-diff" data-diff="medium">рЯФ• Medium</button>
        <button type="button" class="kid-diff" data-diff="hard">рЯТ™ Hard</button>
      </div>

      <section class="kid-panel" id="game-panel">
        <div class="typing-stats">
          <div class="typing-stat">
            <div class="typing-stat-val" id="score">0</div>
            <div class="typing-stat-label">Score</div>
          </div>
          <div class="typing-stat">
            <div class="typing-stat-val" id="streak" style="color: #f39c12">0</div>
            <div class="typing-stat-label">Streak рЯФ•</div>
          </div>
          <div class="typing-stat">
            <div class="typing-stat-val" id="lives-display">вЭ§пЄПвЭ§пЄПвЭ§пЄПвЭ§пЄПвЭ§пЄП</div>
            <div class="typing-stat-label">Lives</div>
          </div>
        </div>

        <div class="typing-arena" id="typing-arena">
          <div class="typing-field" id="typing-field"></div>
        </div>

        <div class="typing-keyboard" id="on-screen-kb" role="group" aria-label="On screen keyboard"></div>

        <div class="kid-actions">
          <button type="button" class="kid-btn-primary" id="start-btn">вЦґпЄП Start game</button>
          <button type="button" class="kid-btn-secondary" id="restart-btn" style="display: none">рЯФД Restart</button>
        </div>

        <div class="kid-msg" id="message" aria-live="polite"></div>

        <p class="typing-tip">рЯТ° Use your keyboard or tap the letters on screen!</p>
      </section>

      <section class="kid-panel kid-result" id="result-area" aria-live="polite">
        <div class="big" id="result-icon" aria-hidden="true">рЯОЙ</div>
        <h2 id="result-title">Game Over!</h2>
        <p id="result-message">Great typing!</p>
        <div class="kid-scores" id="result-stats"></div>
        <button type="button" class="kid-btn-restart" id="play-again-btn">Play again рЯФД</button>
      </section>
    </div>

    <script src="../assets/js/sounds.js"></script>
    <script src="../assets/js/utils.js"></script>
    <script src="../assets/js/effects.js"></script>
    <script src="../assets/js/common.js"></script>
    <script src="../assets/js/typing.js"></script>
  </body>
</html>
