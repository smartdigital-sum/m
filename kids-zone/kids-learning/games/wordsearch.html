<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Word Search — Kids Fun Learning</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="../favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="../assets/css/theme.css" />
  </head>
  <body class="kid-site theme-wordsearch">
    <a href="#main-content" class="kid-skip-link">Skip to main content</a>

    <div class="kid-bubbles" aria-hidden="true">
      <span></span><span></span><span></span><span></span><span></span>
    </div>
    <div class="kid-wrap">
      <div class="kid-topbar">
        <button type="button" class="kid-sound-toggle" id="kid-sound-btn" aria-pressed="false">
          <span class="kid-sound-icon" aria-hidden="true">🔊</span>
          <span class="kid-sound-label">Sound on</span>
        </button>
      </div>

      <a href="../index.html" class="kid-back">⬅ Back to home</a>

      <header class="kid-header">
        <h1 id="main-content" tabindex="-1">🔍 Word Search 🔍</h1>
        <p>Find hidden words in the letter grid!</p>
      </header>

      <div class="kid-tabs" id="category-tabs">
        <button type="button" class="kid-tab kid-tab--a active" data-cat="animals">🐾 Animals</button>
        <button type="button" class="kid-tab kid-tab--b" data-cat="colors">🎨 Colors</button>
        <button type="button" class="kid-tab kid-tab--c" data-cat="food">🍕 Food</button>
      </div>

      <div class="kid-diff-row">
        <button type="button" class="kid-diff is-on" data-diff="easy">🌱 Easy</button>
        <button type="button" class="kid-diff" data-diff="medium">🔥 Medium</button>
        <button type="button" class="kid-diff" data-diff="hard">💪 Hard</button>
      </div>

      <section class="kid-panel" id="game-panel">
        <div class="wordsearch-info">
          <div class="wordsearch-words" id="word-list" aria-label="Words to find"></div>
          <div class="wordsearch-found">
            Found: <span id="found-count">0</span> / <span id="total-words">0</span>
          </div>
        </div>

        <div class="wordsearch-grid-wrap">
          <div class="wordsearch-grid" id="letter-grid" role="grid" aria-label="Letter grid"></div>
        </div>

        <div class="kid-actions">
          <button type="button" class="kid-btn-primary" id="new-puzzle-btn">🔄 New puzzle</button>
        </div>

        <div class="kid-msg" id="message" aria-live="polite"></div>
      </section>

      <section class="kid-panel kid-result" id="result-area" aria-live="polite">
        <div class="big" id="result-icon" aria-hidden="true">🎉</div>
        <h2 id="result-title">Amazing!</h2>
        <p id="result-message">You found all the words!</p>
        <button type="button" class="kid-btn-restart" id="play-again-btn">Play again 🔄</button>
      </section>
    </div>

    <script src="../assets/js/sounds.js"></script>
    <script src="../assets/js/utils.js"></script>
    <script src="../assets/js/effects.js"></script>
    <script src="../assets/js/common.js"></script>
    <script src="../assets/js/wordsearch.js"></script>
  </body>
</html>
