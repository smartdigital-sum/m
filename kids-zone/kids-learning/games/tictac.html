<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic Tac Toe — Kids Fun Learning</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="icon" href="../favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="../assets/css/theme.css" />
  </head>
  <body class="kid-site theme-tictac">
    <a href="#main-content" class="kid-skip-link">Skip to main content</a>
    <div class="kid-bubbles" aria-hidden="true"><span></span><span></span><span></span><span></span><span></span></div>
    <div class="kid-wrap">
      <div class="kid-topbar">
        <button type="button" class="kid-sound-toggle" id="kid-sound-btn" aria-pressed="false">
          <span class="kid-sound-icon" aria-hidden="true">🔊</span>
          <span class="kid-sound-label">Sound on</span>
        </button>
      </div>
      <a href="../index.html" class="kid-back">⬅ Back to home</a>
      <header class="kid-header">
        <h1 id="main-content" tabindex="-1">❌⭕ Tic Tac Toe ⭕❌</h1>
        <p>Get three in a row to win!</p>
      </header>
      <div class="kid-tabs">
        <button type="button" class="kid-tab kid-tab--a active" data-mode="friend">👫 Play vs Friend</button>
        <button type="button" class="kid-tab kid-tab--b" data-mode="easy">🤖 vs Easy Bot</button>
        <button type="button" class="kid-tab kid-tab--c" data-mode="hard">🧠 vs Smart Bot</button>
      </div>
      <section class="kid-panel" id="game-panel">
        <div class="ttt-status">
          <span id="turn-display">❌ X's turn</span>
        </div>
        <div class="ttt-board" id="ttt-board" role="grid" aria-label="Tic Tac Toe board"></div>
        <div class="ttt-scores">
          <div><div class="val ttt-x-score" id="x-score">0</div><div>❌ X wins</div></div>
          <div><div class="val ttt-draw" id="draws">0</div><div>🤝 Draws</div></div>
          <div><div class="val ttt-o-score" id="o-score">0</div><div>⭕ O wins</div></div>
        </div>
        <div class="kid-actions">
          <button type="button" class="kid-btn-primary" id="new-game-btn">🔄 New game</button>
        </div>
        <div class="kid-msg" id="message" aria-live="polite"></div>
      </section>
    </div>
    <script src="../assets/js/sounds.js"></script>
    <script src="../assets/js/utils.js"></script>
    <script src="../assets/js/effects.js"></script>
    <script src="../assets/js/common.js"></script>
    <script src="../assets/js/tictac.js"></script>
  </body>
</html>
