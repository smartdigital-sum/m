<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simon Says — Kids Fun Learning</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="icon" href="../favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="../assets/css/theme.css" />
  </head>
  <body class="kid-site theme-simon">
    <a href="#main-content" class="kid-skip-link">Skip to main content</a>
    <div class="kid-bubbles" aria-hidden="true"><span></span><span></span><span></span><span></span><span></span></div>
    <div class="kid-wrap">
      <div class="kid-topbar">
        <button type="button" class="kid-sound-toggle" id="kid-sound-btn" aria-pressed="false">
          <span class="kid-sound-icon" aria-hidden="true">🔊</span>
          <span class="kid-sound-label">Sound on</span>
        </button>
      </div>
      <a href="../index.html" class="kid-back">⬅ Back to home</a>
      <header class="kid-header">
        <h1 id="main-content" tabindex="-1">🔴 Simon Says 🟢</h1>
        <p>Watch the pattern, then repeat it!</p>
      </header>
      <section class="kid-panel" id="game-panel">
        <div class="simon-info">
          <div class="kid-pill">Round: <span id="round">0</span></div>
          <div class="kid-pill kid-pill--score">⭐ Best: <span id="best">0</span></div>
        </div>
        <div class="simon-board">
          <button type="button" class="simon-btn simon-green" data-color="green" aria-label="Green"></button>
          <button type="button" class="simon-btn simon-red" data-color="red" aria-label="Red"></button>
          <button type="button" class="simon-btn simon-yellow" data-color="yellow" aria-label="Yellow"></button>
          <button type="button" class="simon-btn simon-blue" data-color="blue" aria-label="Blue"></button>
        </div>
        <p class="simon-status" id="simon-status">Press Start to play!</p>
        <div class="kid-actions">
          <button type="button" class="kid-btn-primary" id="start-btn">▶️ Start</button>
        </div>
        <div class="kid-msg" id="message" aria-live="polite"></div>
      </section>
      <section class="kid-panel kid-result" id="result-area" aria-live="polite">
        <div class="big" id="result-icon" aria-hidden="true">😢</div>
        <h2 id="result-title">Game Over!</h2>
        <p id="result-message">You reached round 0</p>
        <button type="button" class="kid-btn-restart" id="restart-btn">Try again 🔄</button>
      </section>
    </div>
    <script src="../assets/js/sounds.js"></script>
    <script src="../assets/js/utils.js"></script>
    <script src="../assets/js/effects.js"></script>
    <script src="../assets/js/common.js"></script>
    <script src="../assets/js/simon.js"></script>
  </body>
</html>
