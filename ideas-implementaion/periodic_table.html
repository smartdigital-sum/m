<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Periodic Table</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f1117;color:#e8eaf0;min-height:100vh;padding:16px}
h1{text-align:center;font-size:22px;font-weight:500;letter-spacing:0.05em;color:#c8cad8;margin-bottom:12px}
#controls{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;align-items:center;justify-content:center}
#search{flex:1;max-width:260px;font-size:13px;background:#1c1f2e;border:1px solid #2e3248;color:#e8eaf0;border-radius:8px;padding:6px 12px;outline:none}
#search:focus{border-color:#5b6af0}
#search::placeholder{color:#555}
#legend{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;justify-content:center}
.leg{display:flex;align-items:center;gap:4px;font-size:11px;color:#9294a8;cursor:pointer;padding:3px 8px;border-radius:20px;border:1px solid transparent;transition:all .15s}
.leg:hover,.leg.active{border-color:#3e4260;background:#1c1f2e;color:#c8cad8}
.leg-dot{width:9px;height:9px;border-radius:2px}
#pt{display:grid;grid-template-columns:repeat(18,1fr);gap:2px;margin-bottom:4px}
#lrow,#arow{display:grid;grid-template-columns:repeat(18,1fr);gap:2px;margin-bottom:2px}
.el{border-radius:4px;padding:3px 2px 2px 3px;cursor:pointer;transition:opacity .15s,transform .1s,box-shadow .1s;aspect-ratio:1;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden;border:1px solid transparent}
.el:hover{transform:scale(1.15);z-index:20;box-shadow:0 4px 16px rgba(0,0,0,0.5)}
.el.dim{opacity:0.1}
.el .num{font-size:7px;line-height:1;opacity:0.7}
.el .sym{font-size:12px;font-weight:600;line-height:1}
.el .ename{font-size:5.5px;line-height:1;opacity:0.65;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.el .mass{font-size:5px;line-height:1;opacity:0.5}
.label-row{display:grid;grid-template-columns:repeat(18,1fr);gap:2px;margin-bottom:2px}
.series-label{grid-column:span 3;display:flex;align-items:center;justify-content:center;font-size:8px;color:#555;font-style:italic}

/* category colors — dark theme */
.cat-nonmetal{background:#1a3020;color:#7ec89a;border-color:#2a4832}
.cat-noble{background:#0e1e3a;color:#7ab4f5;border-color:#1a2e50}
.cat-alkali{background:#3a1510;color:#f59b7a;border-color:#501f14}
.cat-alkaline{background:#2e2010;color:#f0c070;border-color:#483018}
.cat-transition{background:#1a1438;color:#b09cf0;border-color:#2a2050}
.cat-post{background:#0e2828;color:#70d4c8;border-color:#163c3a}
.cat-metalloid{background:#2e1428;color:#e89ad0;border-color:#44204a}
.cat-halogen{background:#202430;color:#b0b8d0;border-color:#303850}
.cat-lanthanide{background:#2e1020;color:#f090b0;border-color:#481828}
.cat-actinide{background:#301010;color:#f08080;border-color:#481818}
.cat-unknown{background:#1c1c1c;color:#888;border-color:#2c2c2c}

#panel{background:#161824;border:1px solid #2e3248;border-radius:12px;padding:20px;margin-top:12px;display:none;animation:fadeIn .2s}
#panel.show{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
#ph{display:flex;gap:16px;align-items:flex-start;margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid #2e3248}
.pel{width:64px;height:64px;border-radius:8px;display:flex;flex-direction:column;justify-content:space-between;padding:6px;flex-shrink:0;border:1px solid rgba(255,255,255,0.1)}
.pel .sym{font-size:24px;font-weight:600}
.pel .num{font-size:10px;opacity:0.7}
.pel .mass{font-size:8px;opacity:0.5}
#pname{font-size:22px;font-weight:500;margin-bottom:4px}
#pcat{font-size:13px;color:#7a7e9a;margin-bottom:8px}
.badge{display:inline-block;font-size:11px;padding:2px 10px;border-radius:12px;margin-right:4px}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.pcard{background:#1c1f2e;border-radius:8px;padding:10px 12px}
.plabel{font-size:11px;color:#7a7e9a;margin-bottom:2px}
.pval{font-size:14px;color:#e8eaf0;font-weight:500}
.more-btn{background:transparent;border:1px solid #3e4260;color:#9294a8;border-radius:8px;padding:8px 16px;cursor:pointer;font-size:13px;margin-top:12px;transition:all .15s}
.more-btn:hover{background:#1c1f2e;color:#e8eaf0;border-color:#5b6af0}
</style>

let activeFilter=null;

function mkEl(el){
  const d=document.createElement('div');
  d.className=`el cat-${el.cat}`;
  d.dataset.n=el.n;
  d.innerHTML=`<span class="num">${el.n}</span><span class="sym">${el.s}</span><span class="ename">${el.name}</span><span class="mass">${el.m}</span>`;
  d.onclick=()=>showPanel(el);
  return d;
}

function buildGrid(){
  const grid=document.getElementById('pt');
  const lrow=document.getElementById('lrow');
  const arow=document.getElementById('arow');
  const map=Array(7).fill(null).map(()=>Array(18).fill(null));
  ELS.filter(e=>e.g&&e.cat!=='lanthanide'&&e.cat!=='actinide').forEach(e=>map[e.p-1][e.g-1]=e);
  for(let r=0;r<7;r++){
    for(let c=0;c<18;c++){
      const e=map[r][c];
      if(e){grid.appendChild(mkEl(e));}
      else{const b=document.createElement('div');b.style.aspectRatio='1';grid.appendChild(b);}
    }
  }
  const ls=document.createElement('div');ls.style.gridColumn='span 3';lrow.appendChild(ls);
  ELS.filter(e=>e.cat==='lanthanide').forEach(e=>lrow.appendChild(mkEl(e)));
  const as2=document.createElement('div');as2.style.gridColumn='span 3';arow.appendChild(as2);
  ELS.filter(e=>e.cat==='actinide').forEach(e=>arow.appendChild(mkEl(e)));
}

function buildLegend(){
  const leg=document.getElementById('legend');
  Object.entries(CATS).forEach(([k,v])=>{
    const d=document.createElement('div');
    d.className='leg';
    d.innerHTML=`<div class="leg-dot" style="background:${CAT_BG[k]}; border:1px solid rgba(255,255,255,0.15)"></div><span>${v}</span>`;
    d.onclick=()=>{
      if(activeFilter===k){activeFilter=null;document.querySelectorAll('.el').forEach(e=>e.classList.remove('dim'));document.querySelectorAll('.leg').forEach(b=>b.classList.remove('active'));}
      else{activeFilter=k;document.querySelectorAll('.el').forEach(e=>{const ed=ELS.find(el=>el.n==e.dataset.n);e.classList.toggle('dim',ed&&ed.cat!==k);});document.querySelectorAll('.leg').forEach(b=>b.classList.remove('active'));d.classList.add('active');}
    };
    leg.appendChild(d);
  });
}

function doSearch(q){
  q=q.toLowerCase().trim();
  document.querySelectorAll('.el').forEach(e=>{
    const ed=ELS.find(el=>el.n==e.dataset.n);
    if(!ed)return;
    const match=!q||ed.name.toLowerCase().includes(q)||ed.s.toLowerCase().includes(q)||String(ed.n).includes(q);
    e.classList.toggle('dim',!match);
  });
}

const STATE_STYLE={Solid:{bg:'#1a1438',color:'#c8a8f8'},Gas:{bg:'#0e1e3a',color:'#7ab4f5'},Liquid:{bg:'#0e2828',color:'#70d4c8'}};

function showPanel(el){
  const panel=document.getElementById('panel');
  panel.className='show';
  const ss=STATE_STYLE[el.state]||{bg:'#1c1c1c',color:'#888'};
  panel.innerHTML=`
    <div id="ph">
      <div class="pel cat-${el.cat}">
        <span class="num">${el.n}</span>
        <span class="sym">${el.s}</span>
        <span class="mass">${el.m}</span>
      </div>
      <div>
        <div id="pname">${el.name}</div>
        <div id="pcat">${CATS[el.cat]} &bull; Period ${el.p}${el.g?' &bull; Group '+el.g:''}</div>
        <span class="badge" style="background:${ss.bg};color:${ss.color};border:1px solid rgba(255,255,255,0.08)">${el.state} at room temp</span>
      </div>
    </div>
    <div class="pgrid">
      <div class="pcard"><div class="plabel">Atomic mass</div><div class="pval">${el.m} u</div></div>
      <div class="pcard"><div class="plabel">Density</div><div class="pval">${el.d} g/cm³</div></div>
      <div class="pcard"><div class="plabel">Melting point</div><div class="pval">${el.mp}°C</div></div>
      <div class="pcard"><div class="plabel">Boiling point</div><div class="pval">${el.bp}°C</div></div>
      <div class="pcard" style="grid-column:span 2"><div class="plabel">Electron configuration</div><div class="pval" style="font-family:monospace;letter-spacing:0.03em">${el.cfg}</div></div>
      <div class="pcard"><div class="plabel">Discovered</div><div class="pval">${el.disc}</div></div>
    </div>`;
  panel.scrollIntoView({behavior:'smooth',block:'nearest'});
}

buildGrid();
buildLegend();
